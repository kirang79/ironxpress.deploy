version: '3.9'

services:
  api:
    image: ironxpress-api:latest
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=mydb;Username=postgres;Password=postgres
    networks:
      - ironxpress-net
    depends_on:
      - db

  web:
   image: nginx:alpine
   volumes:
    - ./web:/usr/share/nginx/html:ro
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
   ports:
    - "8080:80"
   networks:
    - ironxpress-net
   depends_on:
    - api

  db:
   image: postgres:15
   ports:
    - "5433:5432"
   restart: always
   environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: mydb
   networks:
    - ironxpress-net
   volumes:
    - pgdata:/var/lib/postgresql/data
volumes:
 pgdata:

networks:
 ironxpress-net: